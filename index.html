<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F5;color:#333;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.search-row{padding:0 16px;margin-top:-16px;position:relative;z-index:5}
.search-row input{width:100%;padding:12px 40px;border-radius:25px;border:none;font-size:15px;box-shadow:0 2px 12px rgba(0,0,0,.1);outline:none}

.search-row .sclear{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:16px;color:#999;cursor:pointer}

.recipe-card{background:#fff;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s;position:relative}

.auth-box .auth-btn{width:100%;padding:12px;background:#FF6B35;color:#fff;border:none;border-radius:25px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.auth-box .auth-link{text-align:center;margin-top:12px;font-size:13px;color:#999;cursor:pointer}
.auth-box .auth-link span{color:#FF6B35;font-weight:600}
.form-label{font-size:13px;font-weight:600;color:#666;margin-bottom:4px;display:block}

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://nfwdloidytxgtlwhiewd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TyHyw13jEY0PknZilctfNQ_d_tLZNfD';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const MEALDB = 'https://www.themealdb.com/api/json/v1/1';

let session, recipes=[], customRecipes=[], favorites=new Set(), cookedMap={}, proficiency={}, shopItems=[], journals=[];
let currentView='home', currentFilter='all';

const filterOptions=[
  {key:'all',label:'全部'},{key:'简单',label:'简单'},{key:'中等',label:'中等'},
  {key:'困难',label:'困难'},{key:'faved',label:'⭐ 已收藏'},{key:'master',label:'🏆 大师级'}
];
function getProficiency(count){
  if(count>=10) return {level:'大师',cls:'prof-master',emoji:'🏆'};
  if(count>=5) return {level:'熟练',cls:'prof-expert',emoji:'💪'};
  if(count>=2) return {level:'进阶',cls:'prof-skilled',emoji:'👍'};
  if(count>=1) return {level:'初学',cls:'prof-learner',emoji:'🌱'};
  return {level:'新手',cls:'prof-novice',emoji:'📖'};
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── Auth ──
async function checkAuth(){
  const{data}=await supabase.auth.getSession();session=data.session;
  if(session) await loadAllData();render();
}
async function handleAuth(email,pass,isLogin){
  const{data,error}=isLogin?await supabase.auth.signInWithPassword({email,password:pass}):await supabase.auth.signUp({email,password:pass});
  if(error){toast('❌ '+error.message);return;}session=data.session;
  if(!isLogin){toast('✅ 注册成功，请登录');}else{await loadAllData();currentView='home';toast('✅ 登录成功');}
  render();
}
async function handleLogout(){await supabase.auth.signOut();session=null;favorites.clear();cookedMap={};shopItems=[];journals=[];proficiency={};customRecipes=[];render();}

// ── Data ──
async function loadAllData(){
  const[{data:r},{data:f},{data:c},{data:s},{data:cr},{data:j}]=await Promise.all([
    supabase.from('recipes').select('*').order('id'),
    supabase.from('user_favorites').select('recipe_id'),
    supabase.from('user_cooked').select('*'),
    supabase.from('shopping_items').select('*').order('created_at'),
    supabase.from('custom_recipes').select('*').order('created_at',{ascending:false}),
    supabase.from('cooking_journal').select('*').order('cooked_at',{ascending:false}),
  ]);
  recipes=r||[];customRecipes=cr||[];journals=j||[];
  // Custom recipes override built-in ones with same ID (edit-in-place)
  const overrideIds=new Set(customRecipes.map(x=>x.id));
  recipes=recipes.filter(r=>!overrideIds.has(r.id));
  favorites.clear();if(f) f.forEach(x=>favorites.add(x.recipe_id));
  cookedMap={};if(c) c.forEach(x=>{cookedMap[x.recipe_id]={count:x.count,last:x.last_cooked};});
  updateProficiency();
  shopItems=s||[];
}
function updateProficiency(){
  proficiency={};
  const all=[...recipes,...customRecipes];
  all.forEach(r=>{const c=cookedMap[r.id]||{count:0};proficiency[r.id]=getProficiency(c.count);});
}

// ── TheMealDB with Chinese→English translation ──
const FOOD_TRANS={
  '牛肉':'beef','鸡肉':'chicken','猪肉':'pork','羊肉':'lamb','虾':'shrimp','虾仁':'shrimp',
  '鱼':'fish','三文鱼':'salmon','豆腐':'tofu','鸡蛋':'egg','番茄':'tomato','西红柿':'tomato',
  '土豆':'potato','西兰花':'broccoli','胡萝卜':'carrot','茄子':'eggplant','青椒':'pepper',
  '蘑菇':'mushroom','洋葱':'onion','蒜':'garlic','姜':'ginger','米饭':'rice','面':'noodle',
  '面条':'noodle','意面':'pasta','意大利面':'pasta','面包':'bread','蛋糕':'cake','汤':'soup',
  '沙拉':'salad','咖喱':'curry','海鲜':'seafood','奶酪':'cheese','巧克力':'chocolate',
  '玉米':'corn','菠菜':'spinach','黄瓜':'cucumber','辣椒':'chili','鸭':'duck',
  '牛排':'steak','汉堡':'burger','披萨':'pizza','寿司':'sushi','饺子':'dumpling',
  '炒饭':'fried rice','炒面':'chow mein','春卷':'spring roll','排骨':'ribs',
  '红烧肉':'pork belly','宫保':'kung pao','麻婆':'mapo','糖醋':'sweet sour',
  '丸子':'meatball','香肠':'sausage','培根':'bacon','豆':'bean','扁豆':'lentil',
  '白菜':'cabbage','生菜':'lettuce','芹菜':'celery','南瓜':'pumpkin','红薯':'sweet potato',
  '虾饺':'dumpling','烧卖':'dumpling','叉烧':'pork','火锅':'hot pot','粥':'porridge',
};
function translateFood(kw){
  kw=kw.toLowerCase().trim();
  for(const[cn,en]of Object.entries(FOOD_TRANS)) if(kw.includes(cn)) return en;
  return kw; // fallback: use as-is
}
async function searchMealDB(kw){
  const en=translateFood(kw);
  let meals=[];
  // Strategy 1: search by name (translated)
  let res=await fetch(`${MEALDB}/search.php?s=${encodeURIComponent(en)}`);
  let data=await res.json();
  if(data.meals) meals=[...data.meals];
  // Strategy 2: filter by main ingredient
  if(meals.length===0){
    res=await fetch(`${MEALDB}/filter.php?i=${encodeURIComponent(en)}`);
    data=await res.json();
    if(data.meals) meals=[...data.meals];
  }
  // Strategy 3: also try original Chinese keyword
  if(meals.length===0&&kw!==en){
    res=await fetch(`${MEALDB}/search.php?s=${encodeURIComponent(kw)}`);
    data=await res.json();
    if(data.meals) meals=[...data.meals];
  }
  // Dedup
  const seen=new Set();
  meals=meals.filter(m=>{if(seen.has(m.idMeal))return false;seen.add(m.idMeal);return true;});
  return meals.map(m=>({
    id:'api_'+m.idMeal,title:m.strMeal,description:(m.strArea||'')+' · '+(m.strCategory||''),
    difficulty:'中等',cook_time:30,image_url:m.strMealThumb+'/preview',
    ingredients:Array.from({length:20},(_,i)=>m['strIngredient'+(i+1)]).filter(Boolean).map(n=>({name:n,amount:''})),
    steps:[{num:1,text:(m.strInstructions||'').split('\r\n').filter(Boolean).join(' ')||'暂无步骤',detail:''}],
    tags:[m.strCategory,m.strArea].filter(Boolean),isApi:true,
    _orig:m, // keep original for reference
  }));
}
// Simple MealDB name translation map
const MEAL_CN={Beef:'牛肉',Chicken:'鸡肉',Pork:'猪肉',Lamb:'羊肉',Fish:'鱼',
  Shrimp:'虾',Pasta:'意面',Pizza:'披萨',Salad:'沙拉',Soup:'汤',Curry:'咖喱',
  Rice:'米饭',Noodle:'面',Bread:'面包',Cake:'蛋糕',Pie:'派',Stew:'炖菜',
  Roast:'烤',Grilled:'烤',Fried:'炸',Steamed:'蒸',Stir:'炒',Bake:'焗烤',
  Breakfast:'早餐',Dessert:'甜品',Seafood:'海鲜',Vegetable:'蔬菜',Vegan:'素食'};
function cnTitle(en){
  for(const[k,v]of Object.entries(MEAL_CN)) if(en.includes(k)) return en.replace(k,v);
  return en;
}

// ── Custom recipe ──
async function saveCustomRecipe(data,overrideId){
  const row={
    user_id:session.user.id,title:data.title,description:data.desc||'',
    difficulty:data.diff||'中等',cook_time:parseInt(data.time)||20,
    image_url:data.img||null,ingredients:data.ing||[],steps:data.steps||[],tags:data.tags||[]
  };
  let r;
  if(overrideId){
    // Update-in-place: upsert with same ID (preserves cooked count & journal)
    const{data:d,error}=await supabase.from('custom_recipes').upsert({...row,id:overrideId},{onConflict:'id'}).select().single();
    if(error){toast('❌ 保存失败');return;}
    r=d;
    // Remove old version from customRecipes array
    customRecipes=customRecipes.filter(x=>x.id!==overrideId);
    customRecipes.unshift(r);
    toast('✅ 菜谱已更新');
  }else{
    const{data:d,error}=await supabase.from('custom_recipes').insert(row).select().single();
    if(error){toast('❌ 保存失败');return;}
    r=d;
    customRecipes.unshift(r);
    toast('✅ 菜谱已创建');
  }
  updateProficiency();currentView='recipes';render();
}

// ── AI Recipe Generation (multi-provider) ──
const AI_PROVIDERS={
  deepseek:{name:'DeepSeek V4（推荐✨，中文最强）',url:'https://api.deepseek.com/v1/chat/completions',model:'deepseek-chat',keyPrefix:'sk-'},
  groq:{name:'Groq（免费，快）',url:'https://api.groq.com/openai/v1/chat/completions',model:'llama-3.3-70b-versatile',keyPrefix:'gsk_'},
  silicon:{name:'硅基流动（免费额度，中文好）',url:'https://api.siliconflow.cn/v1/chat/completions',model:'deepseek-ai/DeepSeek-V3',keyPrefix:'sk-'},
  zhipu:{name:'智谱GLM（免费额度）',url:'https://open.bigmodel.cn/api/paas/v4/chat/completions',model:'glm-4-flash',keyPrefix:''},
  openai:{name:'OpenAI',url:'https://api.openai.com/v1/chat/completions',model:'gpt-4o-mini',keyPrefix:'sk-'},
  bailian:{name:'阿里百炼',url:'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',model:'qwen-plus',keyPrefix:'sk-'},
  custom:{name:'自定义（OpenAI兼容）',url:'',model:'',keyPrefix:''},

function getAIProvider(){return localStorage.getItem('rm_aiprovider')||'silicon';}
function getAIKey(){return localStorage.getItem('rm_aikey')||'sk-aoxyyqpyndrhqxqwhdxojyofjycuelxverygoljtiwqtzctb';}
function getAIUrl(){const p=AI_PROVIDERS[getAIProvider()];return localStorage.getItem('rm_aiurl')||p.url;}
function getAIModel(){const p=AI_PROVIDERS[getAIProvider()];return localStorage.getItem('rm_aimodel')||p.model;}

async function aiGenerateRecipe(apiRecipe){
  const key=getAIKey(),url=getAIUrl(),model=getAIModel();
  if(!key){toast('❌ 请先设置 AI Key（点击右上角👤）');return null;}
  if(!url){toast('❌ 请先设置 API 地址');return null;}
  toast('🤖 AI 创作菜谱中（约15秒）...');
  const example=`{
  "title": "番茄炒蛋",
  "description": "国民第一家常菜。酸甜浓郁的番茄汁裹着嫩滑的鸡蛋，色泽金黄红亮，是无数中国人学会的第一道菜。一勺番茄炒蛋配一碗白米饭，就是最朴实的幸福感。",
  "difficulty": "简单",
  "cook_time": 10,
  "ingredients": [
    {"name":"番茄","amount":"中等大小 2 个（选熟透的，捏着微软的最好）"},
    {"name":"鸡蛋","amount":"3 个"},
    {"name":"小葱","amount":"2 根"},
    {"name":"盐","amount":"小半勺（约2克）"},
    {"name":"白糖","amount":"一小撮（约3克，提鲜用，吃不出甜味）"},
    {"name":"食用油","amount":"炒菜勺 2 勺（分两次用）"}
  ],
  "steps": [
    {"num":1,"text":"处理食材","detail":"番茄洗净，在顶部划十字，用开水烫10秒后撕皮（懒的话不去皮也行），切成橘子瓣大小的块。鸡蛋磕入碗中，加一丢丢盐，用筷子充分打散到表面起细泡。葱切葱花。"},
    {"num":2,"text":"炒鸡蛋","detail":"大火烧热锅，倒入1勺油，晃一下让油铺满锅底。油微微冒烟时（约七八成热），倒入蛋液。蛋液边缘立刻凝固蓬松起来，用筷子快速划散，约20秒，鸡蛋七八成熟、还是嫩黄色时立刻盛出。千万别炒老！"},
    {"num":3,"text":"炒番茄出汁","detail":"锅里再倒1勺油，放入番茄块，中火翻炒。用铲子轻轻压一压番茄，帮助出汁。炒约1-2分钟，看到番茄变软、析出红色汤汁，锅底有明显汁水即可。"},
    {"num":4,"text":"合炒调味","detail":"倒回鸡蛋，撒入白糖和盐，大火快速翻炒约30秒，让每块鸡蛋都裹上番茄汁。尝一下味道，不够咸就补一点盐。撒葱花，翻两下关火出锅。"}
  ],
  "tags": ["家常菜","快手菜","下饭菜","入门","酸甜"]
}`;
  const prompt=`你是一位专业的中国厨师和美食作家。请根据英文菜谱信息，参照下面的标准格式，用中文创作一份完整的家常菜谱。

【标准格式范例】
${example}

【创作规则】
- 菜名：意译为地道中文名，不要直译
- 描述：50-80字，包含口感、风味、适合场景，像美食杂志一样诱人
- 食材：每一种都要有精确用量，用中国厨房用语（个、根、瓣、勺、小半勺、一小撮），标注1-2人份，有选购/处理小贴士更好
- 步骤：每一步都包含三个要素——火候（大火/中火/小火）、具体时间（约X分钟/X秒）、食物状态（"炒至金黄""煮至软烂""闻到香味""边缘凝固"）。让初学者看了也能做出来
- 难度：客观评估。用料少步骤短=简单，有上浆/勾芡/控火候技巧=中等，长时间炖煮/多步骤=困难
- 耗时：合理的总时间
- 标签：4-5个精准中文标签

【严格输出JSON，不要markdown代码块，不要额外文字】
{"title":"...","description":"...","difficulty":"...","cook_time":数字,"ingredients":[{"name":"...","amount":"..."}],"steps":[{"num":1,"text":"...","detail":"..."}],"tags":["..."]}

英文原菜谱：名称：${apiRecipe.title}  分类：${apiRecipe.description||''}  食材列表：${JSON.stringify((apiRecipe.ingredients||[]).map(i=>typeof i==='string'?i:i.name))}  原文步骤：${JSON.stringify((apiRecipe.steps||[]).map(s=>typeof s==='string'?s:s.text))}`;

  try{
    const res=await fetch(url,{method:'POST',
      headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
      body:JSON.stringify({model:model,messages:[{role:'user',content:prompt}],temperature:0.7,max_tokens:2048})});
    if(!res.ok){toast('❌ HTTP '+res.status);return null;}
    const d=await res.json();
    if(d.error){toast('❌ API: '+(d.error.message||JSON.stringify(d.error)));return null;}
    if(!d.choices||!d.choices[0]||!d.choices[0].message){toast('❌ 响应异常，原文返回');console.log('API raw',d);return null;}
    let content=d.choices[0].message.content||'';
    toast('📥 AI已响应，解析中...');
    content=content.replace(/```(json)?\s*/g,'').replace(/```\s*/g,'').trim();
    const m=content.match(/\{[\s\S]*\}/);
    if(!m){toast('❌ 无JSON: '+content.slice(0,60));return null;}
    const p=JSON.parse(m[0]);
    if(!p.title||!p.ingredients){toast('❌ AI返回不完整');return null;}
    toast('✅ AI 创作完成！');
    return {title:p.title||apiRecipe.title,description:p.description||'',difficulty:p.difficulty||'中等',cook_time:p.cook_time||30,ingredients:p.ingredients||apiRecipe.ingredients||[],steps:p.steps||apiRecipe.steps||[],tags:p.tags||[],image_url:apiRecipe.image_url||null};
  }catch(e){toast('❌ 网络错误: '+e.message);return null;}
}
async function enrichApiRecipe(r){
  const result=await aiGenerateRecipe(r);
  if(result){
    toast('✅ AI 已翻译+补全菜谱');
    return result;
  }
  toast('⚠️ AI 未响应，保存原文（可后续编辑翻译）');
  return {...r,difficulty:r.difficulty||'中等',cook_time:r.cook_time||30};
}

async function uploadImage(file){
  const ext=file.name.split('.').pop();
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const{data,error}=await supabase.storage.from('recipe-images').upload(name,file,{upsert:true});
  if(error){toast('❌ 上传失败: '+error.message);return null;}
  return supabase.storage.from('recipe-images').getPublicUrl(data.path).data.publicUrl;
}

  let photoUrl=null;

  document.querySelector('.modal-overlay')?.remove();

async function doMarkCooked(rid,photoUrl,notes){
  const prev=cookedMap[rid]||{count:0};
  await supabase.from('user_cooked').upsert({user_id:session.user.id,recipe_id:rid,count:prev.count+1,last_cooked:new Date().toISOString()},{onConflict:'user_id,recipe_id'});
  cookedMap[rid]={count:prev.count+1,last:new Date().toISOString()};
  if(photoUrl||notes){
    await supabase.from('cooking_journal').insert({user_id:session.user.id,recipe_id:rid,photo_url:photoUrl,notes});
    journals.unshift({id:Date.now().toString(),user_id:session.user.id,recipe_id:rid,photo_url:photoUrl,notes,cooked_at:new Date().toISOString()});
  }
  updateProficiency();toast('✅ 已记录！');
  // Re-show detail
  const all=[...recipes,...customRecipes];const r=all.find(x=>x.id===rid);
  if(r) showDetail(rid,r.isApi||false);
}
window.incrementCooked=async function(rid){await doMarkCooked(rid,null,null);showDetail(rid,false);};
window.decreaseCooked=async function(rid){
  const cur=cookedMap[rid]||{count:0};
  if(cur.count<=0) return;
  const newCount=cur.count-1;
  if(newCount===0){
    await supabase.from('user_cooked').delete().eq('user_id',session.user.id).eq('recipe_id',rid);
    delete cookedMap[rid];
  }else{
    await supabase.from('user_cooked').upsert({user_id:session.user.id,recipe_id:rid,count:newCount,last_cooked:cur.last},{onConflict:'user_id,recipe_id'});
    cookedMap[rid]={count:newCount,last:cur.last};
  }
  updateProficiency();showDetail(rid,false);
};

async function aiSearchRecipes(kw){
  const key=getAIKey(),url=getAIUrl(),model=getAIModel();
  if(!key||!url) return null;
  try{
    const res=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify({model,temperature:0.8,max_tokens:600,messages:[{role:'user',content:`列出5道关于"${kw}"的中文家常菜。严格JSON：[{"title":"菜名","desc":"简介","tags":["标签"]}]`}]})});
    if(!res.ok) return null;
    const d=await res.json();
    if(!d.choices) return null;
    let raw=d.choices[0].message.content||'';
    raw=raw.replace(/```(\w+)?/g,'').trim();
    const m=raw.match(/\[[\s\S]*\]/);
    if(!m) return null;
    const arr=JSON.parse(m[0]);
    return arr.map((x,i)=>({id:'ai_'+Date.now()+'_'+i,title:x.title||x.菜名||x.name||'',description:x.desc||x.特点||x.title||'',difficulty:'中等',cook_time:30,image_url:'',ingredients:[],steps:[],tags:x.tags||x.标签||[],isApi:true,isAi:true}));
  }catch(e){return null;}
}
window._apiSearch=function(){
  const kw=document.getElementById('searchInput')?.value?.trim();
  if(!kw){toast('请先在搜索框输入关键词');return;}
  const app=document.getElementById('app');
  app.innerHTML=`<div class="content"><div class="back-btn" onclick="currentView='recipes';render()">‹ 返回</div><div class="section-title">🌐 搜索: "${kw}"</div><div class="loading">🤖 AI 智能搜索中...</div></div>`;
  (async()=>{
    let results=await aiSearchRecipes(kw);
    if(!results){toast('⚠️ AI不通，改用英文搜索');results=await searchMealDB(kw);}
    const src=results&&results.length>0&&results[0].isAi?'🤖 AI生成':'🌐 TheMealDB';
    let html=`<div class="content"><div class="back-btn" onclick="currentView='recipes';render()">‹ 返回</div><div class="section-title">${src}: "${kw}" · ${results.length} 个</div>`;
    if(results.length===0) html+='<div class="empty">没有找到 😢<br>换关键词或设置AI Key后重试</div>';
    results.forEach(r=>{html+=`<div class="recipe-card" onclick="showApiDetail('${r.id}')">${r.image_url?`<img class="card-img" src="${r.image_url}" loading="lazy">`:''}<div class="api-badge">${src}</div><div class="card-body"><div class="card-row"><span class="card-title">${r.title}</span></div><div class="card-desc">${r.description||''}</div></div></div>`;});
    html+='</div>';app.innerHTML=html;window._apiResults=results;
  })();
};
window.showApiDetail=function(id){
  const r=(window._apiResults||[]).find(x=>x.id===id);
  if(!r) return;
  // Show detail without auto-adding to recipes — user must explicitly save
  window._currentDetailId=id; window._currentDetailIsApi=true;
  if(!window._parentView) window._parentView=currentView;
  // Temporarily stash the API recipe so showDetail can find it
  window._apiDetailRecipe=window._apiDetailRecipe||{};
  window._apiDetailRecipe[id]=r;
  const tempRecipes=[...recipes];
  recipes.push({...r,id,isApi:true});
  showDetail(id,true);
  recipes=tempRecipes; // revert auto-add, only showDetail uses it
};

// ── Custom Recipe Form ──

window.customBack=function(){
  if(window._formDirty){
    if(confirm('有未保存的内容，是否保存？')){window.submitCustom();return;}
    else if(!confirm('确定放弃修改吗？')) return;
  }
  window._formDirty=false;currentView='recipes';render();
};
window._recipeImgFile=null;
window.previewRecipeImg=function(){
  const f=document.getElementById('recipeImg').files[0];if(!f)return;window._recipeImgFile=f;
  const r=new FileReader();r.onload=e=>{const img=document.getElementById('recipeImgPreview');img.src=e.target.result;img.style.display='block';};r.readAsDataURL(f);
};
window.submitCustom=async function(){
  const title=document.getElementById('rTitle').value.trim();
  if(!title){toast('请输入菜名');return;}
  let imgUrl=null;
  if(window._recipeImgFile) imgUrl=await uploadImage(window._recipeImgFile);
  const ingText=document.getElementById('rIng').value.trim();
  const ingredients=ingText?ingText.split('\n').filter(Boolean).map(line=>{const[nam,...rest]=line.split('—');return{name:(nam||line).trim(),amount:rest.join('—').trim()};}):[];
  const stepsText=document.getElementById('rSteps').value.trim();
  const stepsArr=stepsText?stepsText.split('\n').filter(Boolean).map((line,i)=>{const m=line.match(/^(\d+)\.?\s*(.+)/);return{num:m?parseInt(m[1]):i+1,text:m?m[2]:line,detail:''};}):[];
  const tags=document.getElementById('rTags').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);

// ── Edit custom recipe ──

    const cached=window._apiDetailRecipe&&window._apiDetailRecipe[id];
    if(cached){r=cached;r.isApi=true;}
  }
  if(!r){toast('❌ 菜谱数据丢失，请重新搜索');return;}
  const isCustom=customRecipes.some(x=>x.id===id);
  if(!isCustom||r.isApi){
    const ing=r.ingredients||[];const steps=r.steps||[];
    let data={title:r.title,desc:r.description||'',diff:r.difficulty||'中等',time:r.cook_time||30,img:r.image_url,ing,steps,tags:r.tags||[]};
    if(r.isApi){
      toast('🤖 AI 翻译+补全中（约15秒）...');
      try{data=await enrichApiRecipe(r);}catch(e){toast('⚠️ AI失败，保存原文');}
    }
    const overrideId=!isCustom&&!r.isApi?r.id:null;
    try{
      await saveCustomRecipe(data,overrideId);
    }catch(e){toast('❌ 保存失败: '+e.message);}

  }
  // Edit existing custom recipe
  const ingText=(r.ingredients||[]).map(i=>typeof i==='string'?i:`${i.name} — ${i.amount||''}`).join('\n');
  const stepsText=(r.steps||[]).map(s=>`${s.num}. ${s.text||s}`).join('\n');
  currentView='customForm';
  window._formDirty=false;
  document.getElementById('app').innerHTML=`
    <div class="content">
      <div class="back-btn" onclick="customBack()">‹ 返回</div>
      <div class="section-title" style="font-size:20px">✏️ 编辑菜谱</div>

        <img id="recipeImgPreview" class="preview-img" style="display:none">
        <label class="form-label">菜名 *</label><input id="rTitle" value="${escapeHtml(r.title)}">
        <label class="form-label">简介</label><input id="rDesc" value="${escapeHtml(r.description||'')}">
        <div class="form-row"><div><label class="form-label">难度</label><select id="rDiff" style="width:100%;padding:12px;border-radius:12px;border:1px solid #DDD"><option ${r.difficulty==='简单'?'selected':''}>简单</option><option ${r.difficulty==='中等'?'selected':''}>中等</option><option ${r.difficulty==='困难'?'selected':''}>困难</option></select></div>
        <div><label class="form-label">耗时(分钟)</label><input id="rTime" type="number" value="${r.cook_time}" min="1"></div></div>
        <label class="form-label">食材</label><textarea id="rIng" rows="4">${escapeHtml(ingText)}</textarea>
        <label class="form-label">步骤</label><textarea id="rSteps" rows="5">${escapeHtml(stepsText)}</textarea>
        <label class="form-label">标签</label><input id="rTags" value="${escapeHtml((r.tags||[]).join(', '))}">
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary" onclick="updateCustom('${id}')">💾 保存修改</button>
          <button class="btn btn-outline" style="border-color:#F44336;color:#F44336" onclick="deleteCustom('${id}')">🗑 删除</button>
        </div>
      </div></div>`;
  document.getElementById('recipeImgUpload').onclick=()=>document.getElementById('recipeImg').click();
  document.querySelectorAll('#rTitle,#rDesc,#rIng,#rSteps,#rTags').forEach(el=>el.oninput=()=>{window._formDirty=true;});

  document.getElementById('rTime').oninput=()=>{window._formDirty=true;};

window.updateCustom=async function(id){
  const title=document.getElementById('rTitle').value.trim();if(!title){toast('请输入菜名');return;}
  let imgUrl=(customRecipes.find(x=>x.id===id)||{}).image_url||null;
  if(window._recipeImgFile) imgUrl=await uploadImage(window._recipeImgFile);
  const ingText=document.getElementById('rIng').value.trim();
  const ingredients=ingText?ingText.split('\n').filter(Boolean).map(line=>{const[nam,...rest]=line.split('—');return{name:(nam||line).trim(),amount:rest.join('—').trim()};}):[];
  const stepsText=document.getElementById('rSteps').value.trim();
  const stepsArr=stepsText?stepsText.split('\n').filter(Boolean).map((line,i)=>{const m=line.match(/^(\d+)\.?\s*(.+)/);return{num:m?parseInt(m[1]):i+1,text:m?m[2]:line,detail:''};}):[];
  const tags=document.getElementById('rTags').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
  await supabase.from('custom_recipes').update({title,description:document.getElementById('rDesc').value.trim(),difficulty:document.getElementById('rDiff').value,cook_time:parseInt(document.getElementById('rTime').value)||20,image_url:imgUrl,ingredients,steps:stepsArr,tags}).eq('id',id);

};
window.deleteCustom=async function(id){
  if(!confirm('确定删除这条菜谱？此操作不可撤销。')) return;
  await supabase.from('custom_recipes').delete().eq('id',id);
  await loadAllData();toast('✅ 已删除');currentView='recipes';render();
};
window.deleteCustomRecipe=async function(id){
  if(!confirm('确定删除这条菜谱？打卡记录会保留。')) return;
  await supabase.from('custom_recipes').delete().eq('id',id);
  await loadAllData();toast('✅ 已删除（打卡记录已保留）');
  window._currentDetailId=null;currentView='recipes';render();
};
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Shared actions ──
async function toggleFavDb(rid){
  if(favorites.has(rid)){await supabase.from('user_favorites').delete().eq('recipe_id',rid).eq('user_id',session.user.id);favorites.delete(rid);}
  else{await supabase.from('user_favorites').insert({user_id:session.user.id,recipe_id:rid});favorites.add(rid);}
}
async function addShopDb(recipe){
  for(const ing of recipe.ingredients){
    const name=typeof ing==='string'?ing:ing.name;
    const exists=shopItems.find(s=>s.name===name);
    if(exists) continue;
    const{data}=await supabase.from('shopping_items').insert({user_id:session.user.id,name,recipe_id:recipe.id}).select().single();
    if(data) shopItems.push(data);
  }
}

function renderShop(){
  let html=`<div class="top-bar"><span class="brand">🛒 购物清单</span><span class="user" onclick="handleLogoutWrap()">👤 ${session.user.email} ›</span></div>
    <div class="content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;color:#999">${shopItems.length} 种食材</span>${shopItems.length>0?'<span style="color:#F44336;font-size:13px;cursor:pointer" onclick="doClearShop()">清空全部</span>':''}</div>`;
  if(shopItems.length===0) html+='<div class="empty">购物清单是空的 🛒</div>';
  shopItems.forEach(item=>{
    html+=`<div class="shop-item"><div class="shop-check ${item.checked?'checked':''}" onclick="doToggleShop('${item.id}')"></div><span class="shop-name ${item.checked?'done':''}">${item.name}</span><span class="shop-del" onclick="doRemoveShop('${item.id}')">🗑</span></div>`;
  });
  html+='</div><div class="nav"><button onclick="navTo(\'home\')"><span class="ico">🏠</span>首页</button><button onclick="navTo(\'recipes\')"><span class="ico">📖</span>菜谱</button><button onclick="navTo(\'favorites\')" style="font-size:11px"><span class="ico">❤️</span>收藏</button><button class="active"><span class="ico">🛒</span>清单</button></div>';
  return html;
}

function renderAuth(){
  return `<div style="padding:40px 20px"><div style="text-align:center;margin-bottom:30px"><h1 style="font-size:28px;color:#FF6B35">🍳 RecipeMate</h1><p style="color:#999">登录以同步你的收藏和记录</p></div>
    <div class="auth-box"><h2 id="authTitle">登录</h2><input id="authEmail" type="email" placeholder="邮箱" autocomplete="email"><input id="authPass" type="password" placeholder="密码（至少6位）" autocomplete="current-password"><button class="auth-btn" onclick="doAuth()" id="authBtn">登录</button><div class="auth-link" id="authSwitch">还没有账号？<span onclick="toggleAuth()">注册</span></div></div></div>`;
}

window.navTo=function(v){
  currentView=v;currentFilter='all';window._currentDetailId=null;

};

window.doToggleShop=async function(id){const item=shopItems.find(s=>s.id===id);if(item){await supabase.from('shopping_items').update({checked:!item.checked}).eq('id',id);item.checked=!item.checked;render();}};
window.doRemoveShop=async function(id){await supabase.from('shopping_items').delete().eq('id',id);shopItems=shopItems.filter(s=>s.id!==id);render();};

window.handleLogoutWrap=function(){showSettings();};

    ${provider==='deepseek'?'<p style="font-size:11px;color:#999;margin:4px 0 8px"><a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 便宜好用</p>':''}
    ${provider==='silicon'?'<p style="font-size:11px;color:#999;margin:4px 0 8px"><a href="https://cloud.siliconflow.cn/account/ak" target="_blank">cloud.siliconflow.cn</a> 免费额度</p>':''}

window.adjustCount=function(rid){const count=(cookedMap[rid]||{count:0}).count;showDetail(rid,false);};
window.doAuth=function(){const email=document.getElementById('authEmail').value.trim();const pass=document.getElementById('authPass').value;if(!email||!pass){toast('请填写邮箱和密码');return;}handleAuth(email,pass,window._authMode!=='signup');};
window.toggleAuth=function(){window._authMode=window._authMode==='signup'?'login':'signup';document.getElementById('authTitle').textContent=window._authMode==='signup'?'注册':'登录';document.getElementById('authBtn').textContent=window._authMode==='signup'?'注册':'登录';document.getElementById('authSwitch').innerHTML=window._authMode==='signup'?'已有账号？<span onclick="toggleAuth()">登录</span>':'还没有账号？<span onclick="toggleAuth()">注册</span>';};
window._authMode='login';

// ── Init ──
checkAuth();
